name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# 添加权限声明，确保内置的 GITHUB_TOKEN 有权推送分支
permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          run_install: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build VuePress site
        run: pnpm docs:build

      - name: Deploy to GitHub Pages
        uses: crazy-max/ghaction-github-pages@v4 # 建议也升级该 Action 版本
        with:
          target_branch: gh-pages
          build_dir: docs/.vuepress/dist
        env:
          # 使用内置 Token
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
